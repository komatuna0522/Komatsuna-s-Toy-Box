<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Base Shop System</title>
    <style>
        * { touch-action: none; user-select: none; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #game-world { position: absolute; width: 2500px; height: 1200px; background: #111; border: 10px solid #555; }
        
        /* エリア設定 */
        #battle-area { position: absolute; width: 1200px; height: 1200px; background: #222; background-image: radial-gradient(#333 10%, transparent 10%); background-size: 40px 40px; }
        #secret-base { position: absolute; left: 1500px; top: 300px; width: 400px; height: 400px; background: #001a33; border: 5px solid #00aaff; border-radius: 20px; }
        
        #player { position: absolute; width: 30px; height: 30px; background: #00ff88; border-radius: 5px; z-index: 10; }
        .enemy { position: absolute; width: 30px; height: 30px; background: #ff4444; border-radius: 5px; z-index: 5; }
        .bullet, .e-bullet { position: absolute; width: 8px; height: 8px; border-radius: 50%; z-index: 8; }
        .bullet { background: #ff0; } .e-bullet { background: #f0f; }
        .wall { position: absolute; background: #444; border: 2px solid #666; border-radius: 5px; z-index: 6; }
        
        /* ギミックエリア */
        #exit-game { position: absolute; width: 80px; height: 80px; background: rgba(0, 100, 255, 0.4); border: 4px solid #00aaff; left: 1050px; top: 1050px; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        
        /* 基地内のギミック */
        #shop-trigger { position: absolute; width: 80px; height: 80px; background: rgba(255, 200, 0, 0.2); border: 2px dashed #ffcc00; top: 50px; left: 160px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #ffcc00; }
        #base-return { position: absolute; width: 100px; height: 60px; background: rgba(0, 255, 136, 0.2); border: 2px dashed #00ff88; bottom: 20px; left: 150px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #00ff88; }

        /* UI */
        #ui { position: fixed; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; font-size: 14px; }
        .joy-base { position: fixed; bottom: 40px; width: 90px; height: 90px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid #555; z-index: 100; }
        .joy-stick { position: absolute; top: 20px; left: 20px; width: 50px; height: 50px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        #move-base { left: 20px; } #shoot-base { right: 20px; }
        #tp-btn { position: fixed; top: 10px; right: 10px; width: 60px; height: 60px; background: #aa00ff; border: 2px solid #fff; border-radius: 50%; z-index: 101; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* ショップ用ポップアップ（特定の場所を踏んだ時だけ出る） */
        #shop-ui { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; background: rgba(0,0,0,0.9); border: 3px solid #ffcc00; padding: 15px; border-radius: 15px; text-align: center; z-index: 200; }
        .shop-item { background: #444; margin: 10px; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="game-world">
    <div id="battle-area">
        <div id="exit-game">EXIT</div>
    </div>
    
    <div id="secret-base">
        <div id="shop-trigger">SHOP AREA</div>
        <div id="base-return">EXIT BASE</div>
    </div>

    <div id="player"></div>
</div>

<div id="ui">
    HP: <span id="hp">100</span> / <span id="max-hp">100</span> | <span id="gold">0</span>G<br>
    <span id="loc-msg">BATTLE FIELD</span>
</div>

<div id="shop-ui">
    <h2 style="color:#ffcc00;">🛒 SHOP</h2>
    <div class="shop-item" onclick="buyHeal()">全回復 (15G)</div>
    <div class="shop-item" onclick="buyMaxHP()">最大HP+20 (30G)</div>
    <div class="shop-item" onclick="buyUpgrade()">連射速度UP (20G)</div>
    <div class="shop-item" onclick="buyKey()">脱出の鍵 (100G)</div>
    <p style="font-size:10px; color:#aaa;">※エリアを離れると閉じます</p>
</div>

<div id="move-base" class="joy-base"><div id="move-stick" class="joy-stick"></div></div>
<div id="shoot-base" class="joy-base"><div id="shoot-stick" class="joy-stick"></div></div>
<div id="tp-btn">TP</div>

<script>
    const world = document.getElementById('game-world');
    const player = document.getElementById('player');
    const mStick = document.getElementById('move-stick');
    const sStick = document.getElementById('shoot-stick');
    const shopUi = document.getElementById('shop-ui');
    
    let pPos = { x: 100, y: 100 }, savedPos = { x: 100, y: 100 };
    let moveDir = { x: 0, y: 0 }, shootDir = { x: 0, y: 0 };
    let hp = 100, maxHp = 100, gold = 0, hasKey = false, wepLv = 1;
    let inBase = false, bullets = [], eBullets = [], enemies = [], walls = [];

    function init() {
        // 壁の生成
        for(let i=0; i<15; i++) {
            const w = 50+Math.random()*100, h = 50+Math.random()*100;
            const x = 300+Math.random()*700, y = 300+Math.random()*700;
            const el = document.createElement('div'); el.className = 'wall';
            el.style.width = w+'px'; el.style.height = h+'px';
            el.style.left = x+'px'; el.style.top = y+'px';
            document.getElementById('battle-area').appendChild(el);
            walls.push({x, y, w, h});
        }
        setInterval(() => { if(!inBase) spawnWave(); }, 8000);
        updateUI(); gameLoop();
    }

    document.getElementById('tp-btn').onclick = () => {
        if(!inBase) {
            savedPos = { x: pPos.x, y: pPos.y };
            pPos = { x: 1680, y: 480 }; 
            inBase = true;
            document.getElementById('loc-msg').innerText = "SAFE HOUSE";
            document.getElementById('loc-msg').style.color = "#00aaff";
        }
    };

    function spawnWave() {
        if(inBase) return;
        for(let i=0; i<3; i++) {
            const angle = Math.random()*6.28, dist = 400;
            let ex = Math.max(50, Math.min(1150, pPos.x + Math.cos(angle)*dist));
            let ey = Math.max(50, Math.min(1150, pPos.y + Math.sin(angle)*dist));
            const el = document.createElement('div'); el.className = 'enemy';
            document.getElementById('battle-area').appendChild(el);
            enemies.push({ x: ex, y: ey, el, lastShoot: 0 });
        }
    }

    function isColliding(nx, ny, size) {
        if(inBase) { 
            if(nx < 1500 || nx > 1870 || ny < 300 || ny > 670) return true;
            return false;
        }
        if(nx < 0 || nx > 1170 || ny < 0 || ny > 1170) return true;
        return walls.some(w => nx < w.x + w.w && nx + size > w.x && ny < w.y + w.h && ny + size > w.y);
    }

    function buyHeal() { if(gold>=15){ gold-=15; hp=maxHp; updateUI(); } }
    function buyMaxHP() { if(gold>=30){ gold-=30; maxHp+=20; hp+=20; updateUI(); } }
    function buyUpgrade() { if(gold>=20){ gold-=20; wepLv++; updateUI(); } }
    function buyKey() { if(gold>=100){ gold-=100; hasKey=true; updateUI(); } }
    function updateUI() { 
        document.getElementById('hp').innerText = Math.floor(hp); 
        document.getElementById('max-hp').innerText = maxHp; 
        document.getElementById('gold').innerText = gold; 
    }

    // 操作系
    let activeTouches = {};
    document.addEventListener('touchstart', e => {
        for(let t of e.changedTouches) {
            if(t.clientX < window.innerWidth/2) activeTouches[t.identifier] = "move";
            else activeTouches[t.identifier] = "shoot";
        }
    });
    document.addEventListener('touchmove', e => {
        for(let t of e.touches) {
            const type = activeTouches[t.identifier];
            if(!type) continue;
            const rect = document.getElementById(type+'-base').getBoundingClientRect();
            const dx = t.clientX-(rect.left+45), dy = t.clientY-(rect.top+45);
            const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 45), angle = Math.atan2(dy, dx);
            (type==="move"?mStick:sStick).style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            if(type==="move") moveDir = { x: Math.cos(angle)*(dist/45)*5, y: Math.sin(angle)*(dist/45)*5 };
            else shootDir = { x: Math.cos(angle), y: Math.sin(angle), active: dist > 20 };
        }
    });
    document.addEventListener('touchend', e => {
        for(let t of e.changedTouches) {
            const type = activeTouches[t.identifier];
            if(type==="move"){ mStick.style.transform='none'; moveDir={x:0,y:0}; }
            if(type==="shoot"){ sStick.style.transform='none'; shootDir.active=false; }
            delete activeTouches[t.identifier];
        }
    });

    let lastShoot = 0;
    function gameLoop() {
        if(!isColliding(pPos.x + moveDir.x, pPos.y, 30)) pPos.x += moveDir.x;
        if(!isColliding(pPos.x, pPos.y + moveDir.y, 30)) pPos.y += moveDir.y;
        player.style.left = pPos.x + 'px'; player.style.top = pPos.y + 'px';

        const camX = -pPos.x + window.innerWidth/2, camY = -pPos.y + window.innerHeight/2;
        world.style.transform = `translate(${camX}px, ${camY}px)`;

        // --- 判定系 ---

        // 1. ショップエリア判定（基地内のみ）
        if(inBase && pPos.x > 1640 && pPos.x < 1740 && pPos.y > 330 && pPos.y < 430) {
            shopUi.style.display = 'block';
        } else {
            shopUi.style.display = 'none';
        }

        // 2. 基地からの帰還判定
        if(inBase && pPos.x > 1640 && pPos.x < 1760 && pPos.y > 600) {
            pPos = { x: savedPos.x, y: savedPos.y };
            inBase = false;
            document.getElementById('loc-msg').innerText = "BATTLE FIELD";
            document.getElementById('loc-msg').style.color = "#fff";
        }

        // プレイヤー射撃
        if(shootDir.active && Date.now()-lastShoot > Math.max(100, 500-wepLv*60)) {
            const bEl = document.createElement('div'); bEl.className = 'bullet';
            world.appendChild(bEl);
            bullets.push({ x: pPos.x+11, y: pPos.y+11, vx: shootDir.x*12, vy: shootDir.y*12, el: bEl });
            lastShoot = Date.now();
        }

        bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy; b.el.style.left = b.x+'px'; b.el.style.top = b.y+'px';
            if(isColliding(b.x, b.y, 8)) { b.el.remove(); bullets.splice(i,1); return; }
            enemies.forEach((en, ei) => {
                if(Math.abs(b.x-en.x)<30 && Math.abs(b.y-en.y)<30) {
                    en.el.remove(); enemies.splice(ei,1); b.el.remove(); bullets.splice(i,1); gold++; updateUI();
                }
            });
        });

        if(!inBase) {
            enemies.forEach(en => {
                const dx = pPos.x-en.x, dy = pPos.y-en.y, dist = Math.sqrt(dx*dx+dy*dy);
                if(!isColliding(en.x+dx/dist*2, en.y+dy/dist*2, 30)){ en.x+=dx/dist*2; en.y+=dy/dist*2; }
                if(dist < 350 && Date.now()-en.lastShoot > 2500) {
                    const ebEl = document.createElement('div'); ebEl.className = 'e-bullet';
                    document.getElementById('battle-area').appendChild(ebEl);
                    eBullets.push({ x: en.x+10, y: en.y+10, vx: dx/dist*7, vy: dy/dist*7, el: ebEl });
                    en.lastShoot = Date.now();
                }
                en.el.style.left = en.x+'px'; en.el.style.top = en.y+'px';
            });
        }

        eBullets.forEach((eb, i) => {
            eb.x += eb.vx; eb.y += eb.vy; eb.el.style.left = eb.x+'px'; eb.el.style.top = eb.y+'px';
            if(isColliding(eb.x, eb.y, 8)) { eb.el.remove(); eBullets.splice(i,1); return; }
            if(Math.abs(eb.x-pPos.x)<25 && Math.abs(eb.y-pPos.y)<25) { 
                hp -= 10; eb.el.remove(); eBullets.splice(i,1); updateUI();
                if(hp <= 0) { alert("GAME OVER"); location.reload(); }
            }
        });

        if(!inBase && hasKey && Math.abs(pPos.x-1070)<50 && Math.abs(pPos.y-1070)<50) { alert("脱出成功！"); location.reload(); }
        requestAnimationFrame(gameLoop);
    }
    init();
</script>
</body>
</html>
